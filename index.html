<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sylvie's SATs Revision</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: #fce4ec;
            min-height: 100vh;
            color: #5d3a4a;
            overflow-x: hidden;
        }

        .deco { position: fixed; font-size: 24px; opacity: 0.5; pointer-events: none; animation: float 6s ease-in-out infinite; }
        .deco:nth-child(1) { top: 8%; left: 3%; animation-delay: 0s; }
        .deco:nth-child(2) { top: 15%; right: 8%; animation-delay: 1s; }
        .deco:nth-child(3) { top: 45%; left: 2%; animation-delay: 2s; }
        .deco:nth-child(4) { top: 70%; right: 5%; animation-delay: 3s; }
        .deco:nth-child(5) { top: 85%; left: 10%; animation-delay: 4s; }
        .deco:nth-child(6) { top: 30%; right: 3%; animation-delay: 0.5s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .container { max-width: 800px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 2em; font-weight: 800; color: #6d3a5a; }
        .header .subtitle { font-size: 0.9em; color: #b06888; }

        .back-btn {
            display: inline-flex; align-items: center; gap: 6px;
            background: #fff; border: 2px solid #e8b4c8; border-radius: 20px;
            padding: 8px 18px; font-family: 'Nunito', sans-serif; font-weight: 700;
            font-size: 0.95em; color: #6d3a5a; cursor: pointer; margin-bottom: 15px; transition: all 0.2s;
        }
        .back-btn:hover { background: #f8d7e6; transform: scale(1.03); }

        .progress-section { text-align: center; margin-bottom: 25px; }
        .progress-bar-outer { width: 100%; height: 14px; background: #f5c6d6; border-radius: 10px; overflow: hidden; margin-bottom: 6px; }
        .progress-bar-inner { height: 100%; background: linear-gradient(90deg, #e88aab, #d46a8c); border-radius: 10px; transition: width 0.5s ease; width: 0%; }
        .progress-text { font-size: 0.85em; color: #b06888; }

        /* ===== OCTO-BUDDY ===== */
        .octo-section {
            text-align: center; margin-bottom: 20px;
            background: #fff; border: 2px solid #f0d0de; border-radius: 20px; padding: 20px;
        }
        .octo-container { position: relative; display: inline-block; transition: transform 0.5s ease; }
        .octo-body {
            position: relative; display: inline-block;
            transition: all 0.5s ease;
        }
        .octo-svg { transition: all 0.5s ease; }
        .octo-name { font-weight: 800; font-size: 1.1em; color: #6d3a5a; margin-top: 8px; }
        .octo-level { font-size: 0.85em; color: #b06888; }
        .octo-xp-bar { width: 200px; margin: 8px auto 0; height: 10px; background: #f5d0de; border-radius: 6px; overflow: hidden; }
        .octo-xp-fill { height: 100%; background: linear-gradient(90deg, #a06cd5, #c78de8); border-radius: 6px; transition: width 0.5s; }
        @keyframes octoWiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-3deg); }
            75% { transform: rotate(3deg); }
        }
        .octo-container.wiggle { animation: octoWiggle 0.5s ease; }
        @keyframes octoPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        .octo-container.pop { animation: octoPop 0.4s ease; }

        /* ===== STARS & REWARDS BAR ===== */
        .rewards-bar {
            display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;
            margin-bottom: 20px; padding: 12px; background: #fff;
            border: 2px solid #f0d0de; border-radius: 14px;
        }
        .reward-stat {
            text-align: center;
        }
        .reward-stat .stat-value { font-size: 1.4em; font-weight: 800; color: #d46a8c; }
        .reward-stat .stat-label { font-size: 0.75em; color: #b06888; }

        /* ===== BADGES ===== */
        .badges-section {
            background: #fff; border: 2px solid #f0d0de; border-radius: 18px;
            padding: 20px; margin-bottom: 20px;
        }
        .badges-title { font-weight: 800; font-size: 1.1em; color: #6d3a5a; margin-bottom: 12px; text-align: center; }
        .badges-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .badge {
            width: 70px; height: 70px; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 1.6em; position: relative;
            transition: all 0.3s;
        }
        .badge.locked { background: #f0e0e8; opacity: 0.4; filter: grayscale(1); }
        .badge.unlocked { background: linear-gradient(135deg, #ffecd2, #fcb69f); box-shadow: 0 2px 10px rgba(200,100,60,0.2); }
        .badge .badge-name { font-size: 0.35em; font-weight: 700; color: #6d3a5a; margin-top: 2px; }
        @keyframes badgeUnlock {
            0% { transform: scale(0) rotate(-180deg); }
            60% { transform: scale(1.3) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        .badge.just-unlocked { animation: badgeUnlock 0.6s ease; }

        /* ===== TREATS TRACKER ===== */
        .treats-section {
            background: #fff; border: 2px solid #f0d0de; border-radius: 18px;
            padding: 20px; margin-bottom: 20px;
        }
        .treats-title { font-weight: 800; font-size: 1.1em; color: #6d3a5a; margin-bottom: 12px; text-align: center; }
        .treat-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 14px; border-radius: 12px; margin-bottom: 8px;
            background: #fef6f9; border: 1px solid #f0d0de;
        }
        .treat-item .treat-icon { font-size: 1.5em; }
        .treat-item .treat-info { flex: 1; }
        .treat-item .treat-name { font-weight: 700; font-size: 0.95em; }
        .treat-item .treat-progress-outer { height: 8px; background: #f5d0de; border-radius: 6px; overflow: hidden; margin-top: 4px; }
        .treat-item .treat-progress-inner { height: 100%; background: linear-gradient(90deg, #f6d365, #fda085); border-radius: 6px; transition: width 0.5s; }
        .treat-item .treat-count { font-size: 0.8em; font-weight: 700; color: #c06888; min-width: 60px; text-align: right; }
        .treat-item.earned { background: #eaf7ec; border-color: #b4dbb8; }
        .treat-item.earned .treat-count { color: #3a7d44; }

        /* Settings panel */
        .settings-btn {
            background: none; border: none; font-size: 1.2em; cursor: pointer;
            opacity: 0.6; transition: opacity 0.2s; vertical-align: middle; margin-left: 8px;
        }
        .settings-btn:hover { opacity: 1; }
        .settings-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 500; display: flex;
            align-items: center; justify-content: center;
        }
        .settings-panel {
            background: #fff; border-radius: 20px; padding: 28px;
            max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .settings-panel h2 { font-size: 1.3em; color: #6d3a5a; margin-bottom: 16px; text-align: center; }
        .settings-treat-row {
            display: flex; gap: 8px; align-items: center; margin-bottom: 10px;
        }
        .settings-treat-row input[type="text"] {
            font-family: 'Nunito', sans-serif; font-size: 0.95em; font-weight: 600;
            padding: 8px 12px; border: 2px solid #e8c0d4; border-radius: 10px;
            flex: 1; outline: none; color: #5d3a4a;
        }
        .settings-treat-row input[type="text"]:focus { border-color: #d46a8c; }
        .settings-treat-row .emoji-input {
            width: 50px; text-align: center; font-size: 1.2em;
        }
        .settings-treat-row .stars-input {
            width: 70px; text-align: center;
        }
        .settings-treat-row .stars-label { font-size: 0.8em; color: #b06888; white-space: nowrap; }
        .remove-treat-btn {
            background: none; border: none; font-size: 1.2em; cursor: pointer;
            color: #d88; transition: color 0.2s; padding: 4px;
        }
        .remove-treat-btn:hover { color: #c44; }
        .add-treat-btn {
            display: block; width: 100%; padding: 10px; margin-top: 8px;
            background: #fef0f5; border: 2px dashed #e8c0d4; border-radius: 12px;
            font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.95em;
            color: #b06888; cursor: pointer; transition: all 0.2s;
        }
        .add-treat-btn:hover { background: #f8d7e6; border-color: #d46a8c; }
        .settings-actions { display: flex; gap: 10px; justify-content: center; margin-top: 18px; }
        .settings-note { font-size: 0.8em; color: #b06888; text-align: center; margin-top: 12px; }

        /* ===== SUBJECT GRID ===== */
        .subject-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 30px; }
        @media (max-width: 500px) { .subject-grid { grid-template-columns: 1fr; } }

        .subject-card {
            background: #fff; border: 2px solid #f0d0de; border-radius: 18px;
            padding: 24px 18px; text-align: center; cursor: pointer; transition: all 0.25s;
        }
        .subject-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(200,100,140,0.15); border-color: #e8a0be; }
        .subject-card .icon { font-size: 2.5em; margin-bottom: 8px; }
        .subject-card .name { font-weight: 800; font-size: 1.1em; margin-bottom: 4px; }
        .subject-card .topic-count { font-size: 0.85em; color: #b06888; margin-bottom: 10px; }
        .subject-card .card-progress-outer { width: 100%; height: 8px; background: #f5d0de; border-radius: 6px; overflow: hidden; }
        .subject-card .card-progress-inner { height: 100%; background: linear-gradient(90deg, #e88aab, #d46a8c); border-radius: 6px; transition: width 0.5s; }
        .subject-card .card-pct { font-size: 0.8em; color: #c07898; margin-top: 4px; }

        .topic-list { display: flex; flex-direction: column; gap: 12px; }
        .topic-card {
            background: #fff; border: 2px solid #f0d0de; border-radius: 14px;
            padding: 18px 20px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; transition: all 0.2s;
        }
        .topic-card:hover { border-color: #e8a0be; transform: translateX(4px); }
        .topic-card .topic-info .topic-name { font-weight: 700; font-size: 1.05em; }
        .topic-card .topic-info .topic-qcount { font-size: 0.8em; color: #b06888; }
        .topic-card .topic-score {
            background: #fce4ec; border-radius: 10px; padding: 6px 14px;
            font-weight: 700; font-size: 0.9em; color: #c06888; min-width: 60px; text-align: center;
        }
        .topic-card .topic-score.done { background: #d4edda; color: #3a7d44; }

        .quiz-area { max-width: 650px; margin: 0 auto; }
        .question-counter { text-align: center; font-size: 0.9em; color: #b06888; margin-bottom: 6px; }
        .question-box {
            background: #fff; border: 2px solid #f0d0de; border-radius: 18px;
            padding: 30px 24px; margin-bottom: 18px;
        }
        .question-box .q-text { font-size: 1.15em; font-weight: 700; line-height: 1.5; margin-bottom: 8px; }
        .question-box .q-context {
            font-size: 0.95em; line-height: 1.6; color: #6d4a5a; background: #fef6f9;
            padding: 14px; border-radius: 10px; margin-bottom: 14px; border-left: 4px solid #e8a0be;
        }
        .question-box .q-hint { font-size: 0.85em; color: #b06888; font-style: italic; }

        .answer-input-wrap { margin-bottom: 16px; text-align: center; }
        .answer-input {
            font-family: 'Nunito', sans-serif; font-size: 1.2em; font-weight: 700;
            padding: 12px 20px; border: 2px solid #e8b4c8; border-radius: 12px;
            text-align: center; width: 200px; outline: none; color: #5d3a4a;
        }
        .answer-input:focus { border-color: #d46a8c; }

        .options-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
        .option-btn {
            background: #fff; border: 2px solid #e8c0d4; border-radius: 12px;
            padding: 14px 18px; font-family: 'Nunito', sans-serif; font-size: 1em;
            font-weight: 600; color: #5d3a4a; cursor: pointer; text-align: left; transition: all 0.2s;
        }
        .option-btn:hover { background: #fef0f5; border-color: #d8a0b8; }
        .option-btn.selected { background: #f8d7e6; border-color: #d46a8c; }
        .option-btn.correct { background: #d4edda; border-color: #6abf7b; color: #2d6a3a; }
        .option-btn.wrong { background: #fdd; border-color: #e88; color: #a33; }

        .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn {
            font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 1em;
            padding: 12px 28px; border: none; border-radius: 12px; cursor: pointer; transition: all 0.2s;
        }
        .btn-primary { background: linear-gradient(135deg, #e88aab, #d46a8c); color: #fff; }
        .btn-primary:hover { transform: scale(1.04); box-shadow: 0 4px 14px rgba(200,80,120,0.3); }
        .btn-secondary { background: #fff; border: 2px solid #e8b4c8; color: #6d3a5a; }
        .btn-secondary:hover { background: #fef0f5; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .feedback { text-align: center; padding: 14px; border-radius: 12px; font-weight: 700; margin-bottom: 14px; display: none; }
        .feedback.correct { display: block; background: #d4edda; color: #2d6a3a; }
        .feedback.wrong { display: block; background: #fdd; color: #a33; }

        .results-box {
            background: #fff; border: 2px solid #f0d0de; border-radius: 18px; padding: 30px; text-align: center;
        }
        .results-box .score-big { font-size: 3em; font-weight: 800; color: #d46a8c; margin: 10px 0; }
        .results-box .score-label { font-size: 1.1em; color: #b06888; }
        .results-box .encouragement { font-size: 1.2em; font-weight: 700; margin: 15px 0; color: #6d3a5a; }
        .stars-earned-display { font-size: 1.3em; margin: 10px 0; }
        .results-list { text-align: left; margin: 20px 0; }
        .result-item { padding: 12px 16px; border-radius: 10px; margin-bottom: 8px; font-size: 0.95em; }
        .result-item.was-correct { background: #eaf7ec; }
        .result-item.was-wrong { background: #fef0f0; }
        .result-item .ri-q { font-weight: 700; margin-bottom: 4px; }
        .result-item .ri-correct { color: #3a7d44; font-weight: 600; }
        .result-item .ri-yours { color: #c44; font-weight: 600; }

        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .mt-10 { margin-top: 10px; }
        .mb-20 { margin-bottom: 20px; }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); }
        }
        .star-burst { display: inline-block; animation: popIn 0.4s ease; }

        /* Star shower on quiz complete */
        .star-shower { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; overflow: hidden; }
        .falling-star {
            position: absolute; top: -40px; font-size: 24px;
            animation: fallStar 2s ease-in forwards;
        }
        @keyframes fallStar {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* Notification popup */
        .notification {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: #fff; border: 2px solid #e8a0be; border-radius: 16px;
            padding: 14px 24px; font-weight: 700; color: #6d3a5a;
            box-shadow: 0 8px 30px rgba(200,100,140,0.25); z-index: 1000;
            transition: transform 0.4s ease; text-align: center;
        }
        .notification.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="deco">🍄</div>
<div class="deco">✨</div>
<div class="deco">💖</div>
<div class="deco">🌸</div>
<div class="deco">⭐</div>
<div class="deco">🦋</div>

<div id="notification" class="notification"></div>

<div class="container">
    <!-- HOME SCREEN -->
    <div id="screen-home">
        <div class="header">
            <h1>📚 Sylvie's SATs Revision</h1>
            <div class="subtitle">✨ 💖 ✨</div>
        </div>

        <!-- Octo-Buddy -->
        <div class="octo-section">
            <div class="octo-container" id="octo-container">
                <div class="octo-body" id="octo-body"></div>
            </div>
            <div class="octo-name" id="octo-name">Octavia</div>
            <div class="octo-level" id="octo-level">Level 1 - Tiny Baby</div>
            <div class="octo-xp-bar"><div class="octo-xp-fill" id="octo-xp-fill"></div></div>
            <div class="progress-text mt-10" id="octo-xp-text">0 / 10 stars to next level</div>
        </div>

        <!-- Stars & Rewards -->
        <div class="rewards-bar">
            <div class="reward-stat">
                <div class="stat-value" id="total-stars">0</div>
                <div class="stat-label">⭐ Total Stars</div>
            </div>
            <div class="reward-stat">
                <div class="stat-value" id="total-badges">0</div>
                <div class="stat-label">🏅 Badges</div>
            </div>
            <div class="reward-stat">
                <div class="stat-value" id="total-streak">0</div>
                <div class="stat-label">🔥 Day Streak</div>
            </div>
            <div class="reward-stat">
                <div class="stat-value" id="total-quizzes">0</div>
                <div class="stat-label">📝 Quizzes Done</div>
            </div>
        </div>

        <!-- Treats Tracker -->
        <div class="treats-section">
            <div class="treats-title">🎁 Treat Tracker <button class="settings-btn" onclick="openTreatSettings()" title="Edit treats">⚙️</button></div>
            <div id="treats-list"></div>
        </div>

        <!-- Badges -->
        <div class="badges-section">
            <div class="badges-title">🏅 Badge Collection</div>
            <div class="badges-grid" id="badges-grid"></div>
        </div>

        <div class="progress-section">
            <div class="progress-bar-outer"><div class="progress-bar-inner" id="overall-progress"></div></div>
            <div class="progress-text" id="overall-pct">0% complete</div>
        </div>
        <div class="subject-grid" id="subject-grid"></div>
    </div>

    <!-- TOPICS SCREEN -->
    <div id="screen-topics" class="hidden">
        <button class="back-btn" onclick="showHome()">⬅ Back</button>
        <div class="header"><h1 id="subject-title"></h1></div>
        <div class="progress-section">
            <div class="progress-bar-outer"><div class="progress-bar-inner" id="subject-progress"></div></div>
            <div class="progress-text" id="subject-pct">0% complete</div>
        </div>
        <div class="topic-list" id="topic-list"></div>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="screen-quiz" class="hidden">
        <button class="back-btn" onclick="exitQuiz()">⬅ Back</button>
        <div class="quiz-area">
            <div class="question-counter" id="q-counter"></div>
            <div class="progress-bar-outer mb-20"><div class="progress-bar-inner" id="quiz-progress"></div></div>
            <div id="q-context-area"></div>
            <div class="question-box">
                <div class="q-text" id="q-text"></div>
                <div class="q-hint hidden" id="q-hint"></div>
            </div>
            <div id="q-options"></div>
            <div id="q-input-area" class="hidden answer-input-wrap">
                <input type="text" class="answer-input" id="q-input" autocomplete="off" />
            </div>
            <div class="feedback" id="feedback"></div>
            <div class="btn-row">
                <button class="btn btn-primary" id="btn-submit" onclick="submitAnswer()">Check Answer</button>
                <button class="btn btn-primary hidden" id="btn-next" onclick="nextQuestion()">Next Question →</button>
            </div>
        </div>
    </div>

    <!-- RESULTS SCREEN -->
    <div id="screen-results" class="hidden">
        <button class="back-btn" onclick="backToTopics()">⬅ Back to Topics</button>
        <div class="results-box">
            <div class="score-label">You scored</div>
            <div class="score-big" id="result-score"></div>
            <div class="stars-earned-display" id="stars-earned"></div>
            <div class="encouragement" id="result-msg"></div>
            <div class="results-list" id="results-list"></div>
            <div class="btn-row mt-10">
                <button class="btn btn-primary" onclick="retryQuiz()">Try Again</button>
                <button class="btn btn-secondary" onclick="backToTopics()">Back to Topics</button>
            </div>
        </div>
    </div>
</div>

<script>
// ============================================================
//  QUESTION BANK
// ============================================================
const SUBJECTS = [
    {
        id: "maths-arithmetic", name: "Maths Arithmetic", icon: "➕",
        topics: [
            { name: "Addition & Subtraction", questions: [
                { q: "What is 3,456 + 2,897?", type: "input", answer: "6353" },
                { q: "Calculate 8,004 − 3,567", type: "input", answer: "4437" },
                { q: "What is 12,345 + 6,789?", type: "input", answer: "19134" },
                { q: "Calculate 50,000 − 27,863", type: "input", answer: "22137" },
                { q: "What is 4,567 + 3,894 + 1,239?", type: "input", answer: "9700" },
                { q: "Calculate 100,000 − 45,678", type: "input", answer: "54322" },
                { q: "What is 23,456 + 8,765?", type: "input", answer: "32221" },
                { q: "Calculate 70,301 − 28,456", type: "input", answer: "41845" },
            ]},
            { name: "Multiplication", questions: [
                { q: "What is 346 × 7?", type: "input", answer: "2422" },
                { q: "Calculate 28 × 34", type: "input", answer: "952" },

    try {

            Object.assign(state, parsed);
        }
    } catch(e) {}

    try {
        localStorage.setItem("sats-state-v2", JSON.stringify({
            progress: state.progress, totalStars: state.totalStars,
            quizzesDone: state.quizzesDone, badges: state.badges,
            streak: state.streak, lastPlayDate: state.lastPlayDate,
            hasPerfect: state.hasPerfect, octoName: state.octoName
        }));
    } catch(e) {}
}
loadState();

// Update streak
function updateStreak() {
    const today = new Date().toDateString();
    if (state.lastPlayDate === today) return;
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (state.lastPlayDate === yesterday) {
        state.streak++;
    } else if (state.lastPlayDate !== today) {
        state.streak = 1;
    }
    state.lastPlayDate = today;
    saveState();
}

// ============================================================
//  HELPER: subject completion
// ============================================================
function subjectDone(subId) {
    const sub = SUBJECTS.find(s => s.id === subId);
    if (!sub) return false;
    return sub.topics.every((t, ti) => {
        const key = subId + ":" + ti;
        return state.progress[key] && state.progress[key].best >= Math.ceil(t.questions.length * 0.6);
    });
}
function allSubjectsDone() {
    return SUBJECTS.every(s => subjectDone(s.id));
}

// ============================================================
//  OCTOPUS DRAWING (SVG)
// ============================================================
function getOctoLevel() {
    let lvl = 0;
    for (let i = OCTO_LEVELS.length - 1; i >= 0; i--) {
        if (state.totalStars >= OCTO_LEVELS[i].starsNeeded) { lvl = i; break; }
    }
    return lvl;
}

function drawOctopus() {
    const lvl = getOctoLevel();
    const o = OCTO_LEVELS[lvl];
    const size = o.size;
    const half = size / 2;
    const bodyH = size * 0.45;
    const bodyW = size * 0.5;
    const eyeSize = size * 0.06;
    const earSize = size * 0.18;

    // Build tentacles
    let tentaclesSvg = "";
    const tentCount = o.tentacles;
    const spread = bodyW * 1.6;
    for (let i = 0; i < tentCount; i++) {
        const t = i / (tentCount - 1);
        const x = half - spread/2 + t * spread;
        const baseY = half + bodyH * 0.3;
        const tipY = baseY + size * 0.35;
        const curve = (t - 0.5) * size * 0.4;
        const wave = Math.sin(i * 1.5) * size * 0.1;
        tentaclesSvg += `<path d="M${x},${baseY} Q${x + curve + wave},${(baseY+tipY)/2} ${x + curve * 0.5},${tipY}" stroke="${o.color}" stroke-width="${size*0.06}" fill="none" stroke-linecap="round" opacity="0.9"/>`;
    }

    const svg = `<svg class="octo-svg" width="${size}" height="${size * 1.1}" viewBox="0 0 ${size} ${size * 1.1}">
        <!-- Ears -->
        <ellipse cx="${half - bodyW * 0.7}" cy="${half - bodyH * 0.2}" rx="${earSize}" ry="${earSize * 0.7}" fill="${o.color}" opacity="0.6" transform="rotate(-20 ${half - bodyW*0.7} ${half - bodyH*0.2})"/>
        <ellipse cx="${half + bodyW * 0.7}" cy="${half - bodyH * 0.2}" rx="${earSize}" ry="${earSize * 0.7}" fill="${o.color}" opacity="0.6" transform="rotate(20 ${half + bodyW*0.7} ${half - bodyH*0.2})"/>
        <!-- Inner ears -->
        <ellipse cx="${half - bodyW * 0.7}" cy="${half - bodyH * 0.2}" rx="${earSize*0.6}" ry="${earSize * 0.4}" fill="#f8c8e0" opacity="0.7" transform="rotate(-20 ${half - bodyW*0.7} ${half - bodyH*0.2})"/>
        <ellipse cx="${half + bodyW * 0.7}" cy="${half - bodyH * 0.2}" rx="${earSize*0.6}" ry="${earSize * 0.4}" fill="#f8c8e0" opacity="0.7" transform="rotate(20 ${half + bodyW*0.7} ${half - bodyH*0.2})"/>
        <!-- Body -->
        <ellipse cx="${half}" cy="${half}" rx="${bodyW}" ry="${bodyH}" fill="${o.color}"/>
        <!-- Sheen -->
        <ellipse cx="${half - bodyW*0.2}" cy="${half - bodyH*0.3}" rx="${bodyW*0.25}" ry="${bodyH*0.2}" fill="white" opacity="0.25"/>
        <!-- Eyes -->
        <circle cx="${half - bodyW*0.3}" cy="${half - bodyH*0.05}" r="${eyeSize*1.4}" fill="white"/>
        <circle cx="${half + bodyW*0.3}" cy="${half - bodyH*0.05}" r="${eyeSize*1.4}" fill="white"/>
        <circle cx="${half - bodyW*0.28}" cy="${half - bodyH*0.02}" r="${eyeSize}" fill="#333"/>
        <circle cx="${half + bodyW*0.28}" cy="${half - bodyH*0.02}" r="${eyeSize}" fill="#333"/>
        <circle cx="${half - bodyW*0.26}" cy="${half - bodyH*0.08}" r="${eyeSize*0.35}" fill="white"/>
        <circle cx="${half + bodyW*0.26}" cy="${half - bodyH*0.08}" r="${eyeSize*0.35}" fill="white"/>
        <!-- Smile -->
        <path d="M${half - bodyW*0.15},${half + bodyH*0.2} Q${half},${half + bodyH*0.4} ${half + bodyW*0.15},${half + bodyH*0.2}" stroke="#fff" stroke-width="${size*0.025}" fill="none" stroke-linecap="round" opacity="0.8"/>
        <!-- Cheeks -->
        <ellipse cx="${half - bodyW*0.45}" cy="${half + bodyH*0.15}" rx="${eyeSize}" ry="${eyeSize*0.6}" fill="#f8a0c0" opacity="0.5"/>
        <ellipse cx="${half + bodyW*0.45}" cy="${half + bodyH*0.15}" rx="${eyeSize}" ry="${eyeSize*0.6}" fill="#f8a0c0" opacity="0.5"/>
        <!-- Tentacles -->
        ${tentaclesSvg}
    </svg>`;

    document.getElementById("octo-body").innerHTML = svg;

    // Level info
    const nextLvl = lvl < OCTO_LEVELS.length - 1 ? OCTO_LEVELS[lvl + 1] : null;
    document.getElementById("octo-name").textContent = state.octoName;
    document.getElementById("octo-level").textContent = `Level ${lvl + 1} — ${o.name}`;

    if (nextLvl) {
        const progress = state.totalStars - o.starsNeeded;
        const needed = nextLvl.starsNeeded - o.starsNeeded;
        const pct = Math.min(100, Math.round((progress / needed) * 100));
        document.getElementById("octo-xp-fill").style.width = pct + "%";
        document.getElementById("octo-xp-text").textContent = `${state.totalStars} / ${nextLvl.starsNeeded} stars to next level`;
    } else {
        document.getElementById("octo-xp-fill").style.width = "100%";
        document.getElementById("octo-xp-text").textContent = `MAX LEVEL! ${state.totalStars} stars earned!`;
    }
}

// ============================================================
//  NOTIFICATIONS
// ============================================================
function showNotification(text) {
    const el = document.getElementById("notification");
    el.textContent = text;
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 3000);
}

// ============================================================
//  STAR SHOWER
// ============================================================
function triggerStarShower(count) {
    const div = document.createElement("div");
    div.className = "star-shower";
    document.body.appendChild(div);
    const emojis = ["⭐", "🌟", "✨", "💫"];
    for (let i = 0; i < Math.min(count * 3, 30); i++) {
        const star = document.createElement("div");
        star.className = "falling-star";
        star.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        star.style.left = Math.random() * 100 + "%";
        star.style.animationDelay = Math.random() * 1.5 + "s";
        star.style.fontSize = (16 + Math.random() * 20) + "px";
        div.appendChild(star);
    }
    setTimeout(() => div.remove(), 4000);
}

// ============================================================
//  CHECK BADGES
// ============================================================
function checkBadges() {
    const stats = {
        totalStars: state.totalStars,
        quizzesDone: state.quizzesDone,
        hasPerfect: state.hasPerfect,
        streak: state.streak
    };
    let newBadges = [];
    BADGE_DEFS.forEach(b => {
        if (!state.badges.includes(b.id) && b.check(stats)) {
            state.badges.push(b.id);
            newBadges.push(b);
        }
    });
    if (newBadges.length > 0) {
        saveState();
        newBadges.forEach((b, i) => {
            setTimeout(() => showNotification(`🏅 Badge unlocked: ${b.icon} ${b.name}!`), i * 2000);
        });
    }
    return newBadges;
}

// ============================================================
//  RENDER FUNCTIONS
// ============================================================
function showScreen(id) {
    ["screen-home","screen-topics","screen-quiz","screen-results"].forEach(s => {
        document.getElementById(s).classList.toggle("hidden", s !== id);
    });
    window.scrollTo(0, 0);
}

function renderHome() {
    showScreen("screen-home");

    // Draw octopus
    drawOctopus();

    // Stats
    document.getElementById("total-stars").textContent = state.totalStars;
    document.getElementById("total-badges").textContent = state.badges.length;
    document.getElementById("total-streak").textContent = state.streak;
    document.getElementById("total-quizzes").textContent = state.quizzesDone;

    // Treats
    const treatsList = document.getElementById("treats-list");
    treatsList.innerHTML = "";
    TREATS.forEach(t => {
        const earned = state.totalStars >= t.stars;
        const pct = Math.min(100, Math.round((state.totalStars / t.stars) * 100));
        const item = document.createElement("div");
        item.className = "treat-item" + (earned ? " earned" : "");
        item.innerHTML = `
            <div class="treat-icon">${t.icon}</div>
            <div class="treat-info">
                <div class="treat-name">${t.name}${earned ? " — EARNED!" : ""}</div>
                <div class="treat-progress-outer"><div class="treat-progress-inner" style="width:${pct}%"></div></div>
            </div>
            <div class="treat-count">${Math.min(state.totalStars, t.stars)} / ${t.stars} ⭐</div>
        `;
        treatsList.appendChild(item);
    });

    // Badges
    const badgesGrid = document.getElementById("badges-grid");
    badgesGrid.innerHTML = "";
    BADGE_DEFS.forEach(b => {
        const unlocked = state.badges.includes(b.id);
        const badge = document.createElement("div");
        badge.className = "badge " + (unlocked ? "unlocked" : "locked");
        badge.title = b.desc;
        badge.innerHTML = `${b.icon}<div class="badge-name">${b.name}</div>`;
        badgesGrid.appendChild(badge);
    });

    // Subject grid
    const grid = document.getElementById("subject-grid");
    grid.innerHTML = "";
    let totalQ = 0, totalCorrect = 0;

    SUBJECTS.forEach(sub => {
        let subQ = 0, subCorrect = 0;
        sub.topics.forEach((topic, ti) => {
            const key = sub.id + ":" + ti;
            const qCount = topic.questions.length;
            subQ += qCount; totalQ += qCount;
            if (state.progress[key]) { subCorrect += state.progress[key].best; totalCorrect += state.progress[key].best; }
        });
        const pct = subQ > 0 ? Math.round((subCorrect / subQ) * 100) : 0;
        const card = document.createElement("div");
        card.className = "subject-card";
        card.onclick = () => showSubject(sub.id);
        card.innerHTML = `
            <div class="icon">${sub.icon}</div>
            <div class="name">${sub.name}</div>
            <div class="topic-count">${sub.topics.length} topics</div>
            <div class="card-progress-outer"><div class="card-progress-inner" style="width:${pct}%"></div></div>
            <div class="card-pct">${pct}%</div>
        `;
        grid.appendChild(card);
    });

    const overallPct = totalQ > 0 ? Math.round((totalCorrect / totalQ) * 100) : 0;
    document.getElementById("overall-progress").style.width = overallPct + "%";
    document.getElementById("overall-pct").textContent = overallPct + "% complete";
}

function showHome() { renderHome(); }

function showSubject(subjectId) {
    const sub = SUBJECTS.find(s => s.id === subjectId);
    if (!sub) return;
    state.currentSubject = sub;
    showScreen("screen-topics");
    document.getElementById("subject-title").textContent = sub.icon + " " + sub.name;

    let subQ = 0, subCorrect = 0;
    const list = document.getElementById("topic-list");
    list.innerHTML = "";

    sub.topics.forEach((topic, ti) => {
        const key = sub.id + ":" + ti;
        const qCount = topic.questions.length;
        subQ += qCount;
        const best = state.progress[key] ? state.progress[key].best : 0;
        subCorrect += best;
        const done = best === qCount;

        const card = document.createElement("div");
        card.className = "topic-card";
        card.onclick = () => startQuiz(sub, ti);
        card.innerHTML = `
            <div class="topic-info">
                <div class="topic-name">${topic.name}</div>
                <div class="topic-qcount">${qCount} questions</div>
            </div>
            <div class="topic-score ${done ? 'done' : ''}">${best}/${qCount}</div>
        `;
        list.appendChild(card);
    });

    const pct = subQ > 0 ? Math.round((subCorrect / subQ) * 100) : 0;
    document.getElementById("subject-progress").style.width = pct + "%";
    document.getElementById("subject-pct").textContent = pct + "% complete";
}

function backToTopics() { state.currentSubject ? showSubject(state.currentSubject.id) : showHome(); }

// ============================================================
//  QUIZ
// ============================================================
function startQuiz(subject, topicIdx) {
    state.currentSubject = subject;
    state.currentTopic = topicIdx;
    state.currentQuestionIdx = 0;
    state.answers = [];
    state.answered = false;
    const topic = subject.topics[topicIdx];
    topic._shuffled = [...topic.questions].sort(() => Math.random() - 0.5);
    showScreen("screen-quiz");
    renderQuestion();
}

function renderQuestion() {
    const topic = state.currentSubject.topics[state.currentTopic];
    const questions = topic._shuffled || topic.questions;
    const qIdx = state.currentQuestionIdx;
    const q = questions[qIdx];
    const total = questions.length;
    state.answered = false;

    document.getElementById("q-counter").textContent = `Question ${qIdx + 1} of ${total}`;
    document.getElementById("quiz-progress").style.width = ((qIdx / total) * 100) + "%";

    const ctxArea = document.getElementById("q-context-area");
    ctxArea.innerHTML = q.context ? `<div class="question-box"><div class="q-context">${q.context}</div></div>` : "";

    document.getElementById("q-text").textContent = q.q;
    const hintEl = document.getElementById("q-hint");
    if (q.hint) { hintEl.textContent = q.hint; hintEl.classList.remove("hidden"); }
    else { hintEl.classList.add("hidden"); }

    const optionsDiv = document.getElementById("q-options");
    const inputArea = document.getElementById("q-input-area");
    const inputEl = document.getElementById("q-input");

    if (q.type === "mc") {
        inputArea.classList.add("hidden");
        const shuffledOpts = [...q.options].sort(() => Math.random() - 0.5);
        optionsDiv.innerHTML = "";
        optionsDiv.className = "options-list";
        shuffledOpts.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.textContent = opt;
            btn.onclick = () => selectOption(btn);
            optionsDiv.appendChild(btn);
        });
    } else {
        optionsDiv.innerHTML = "";
        inputArea.classList.remove("hidden");
        inputEl.value = "";
        inputEl.focus();
    }

    document.getElementById("feedback").className = "feedback";
    document.getElementById("feedback").textContent = "";
    document.getElementById("btn-submit").classList.remove("hidden");
    document.getElementById("btn-submit").disabled = false;
    document.getElementById("btn-next").classList.add("hidden");
}

function selectOption(btn) {
    if (state.answered) return;
    document.querySelectorAll(".option-btn").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
}

function submitAnswer() {
    if (state.answered) return;
    const topic = state.currentSubject.topics[state.currentTopic];
    const questions = topic._shuffled || topic.questions;
    const q = questions[state.currentQuestionIdx];
    let userAnswer = "";

    if (q.type === "mc") {
        const selected = document.querySelector(".option-btn.selected");
        if (!selected) return;
        userAnswer = selected.textContent;
    } else {
        userAnswer = document.getElementById("q-input").value.trim();
        if (!userAnswer) return;
    }

    state.answered = true;
    const isCorrect = normalizeAnswer(userAnswer) === normalizeAnswer(q.answer);
    state.answers.push({ question: q, selected: userAnswer, correct: isCorrect });

    const fb = document.getElementById("feedback");
    if (isCorrect) {
        fb.className = "feedback correct";
        fb.innerHTML = '<span class="star-burst">⭐</span> Correct! +1 star!';
    } else {
        fb.className = "feedback wrong";
        fb.textContent = `Not quite. The answer is: ${q.answer}`;
    }

    if (q.type === "mc") {
        document.querySelectorAll(".option-btn").forEach(btn => {
            btn.style.pointerEvents = "none";
            if (normalizeAnswer(btn.textContent) === normalizeAnswer(q.answer)) btn.classList.add("correct");
            else if (btn.classList.contains("selected") && !isCorrect) btn.classList.add("wrong");
        });
    }

    document.getElementById("btn-submit").classList.add("hidden");
    document.getElementById("btn-next").classList.remove("hidden");
}

function normalizeAnswer(s) {
    return String(s).toLowerCase().replace(/[£,\s]/g, "").replace(/\u00a3/g, "");
}

function nextQuestion() {
    const topic = state.currentSubject.topics[state.currentTopic];
    const questions = topic._shuffled || topic.questions;
    state.currentQuestionIdx++;
    if (state.currentQuestionIdx >= questions.length) showResults();
    else renderQuestion();
}

function exitQuiz() { backToTopics(); }

document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        if (!state.answered && !document.getElementById("screen-quiz").classList.contains("hidden")) submitAnswer();
        else if (state.answered && !document.getElementById("btn-next").classList.contains("hidden")) nextQuestion();
    }
});

// ============================================================
//  RESULTS
// ============================================================
function showResults() {
    showScreen("screen-results");

    const correct = state.answers.filter(a => a.correct).length;
    const total = state.answers.length;
    const pct = Math.round((correct / total) * 100);

    // Award stars (1 per correct answer)
    const starsEarned = correct;
    state.totalStars += starsEarned;
    state.quizzesDone++;
    if (pct === 100) state.hasPerfect = true;

    // Update streak
    updateStreak();

    // Save best score
    const key = state.currentSubject.id + ":" + state.currentTopic;
    const prev = state.progress[key] ? state.progress[key].best : 0;
    if (correct > prev) state.progress[key] = { best: correct, total: total };
    saveState();

    // Check for level up
    const prevLevel = getOctoLevelForStars(state.totalStars - starsEarned);
    const newLevel = getOctoLevel();
    if (newLevel > prevLevel) {
        setTimeout(() => {
            showNotification(`🎉 ${state.octoName} grew to Level ${newLevel + 1}: ${OCTO_LEVELS[newLevel].name}!`);
            const container = document.getElementById("octo-container");
            if (container) { container.classList.add("pop"); setTimeout(() => container.classList.remove("pop"), 500); }
        }, 500);
    }

    // Check badges
    setTimeout(() => checkBadges(), 1500);

    // Star shower!
    if (starsEarned > 0) triggerStarShower(starsEarned);

    document.getElementById("result-score").textContent = `${correct} / ${total}`;
    document.getElementById("stars-earned").innerHTML = `⭐ +${starsEarned} stars earned! (Total: ${state.totalStars})`;

    let msg = "";
    if (pct === 100) msg = "Perfect score! You're a superstar! ⭐";
    else if (pct >= 80) msg = "Brilliant work! Nearly perfect!";
    else if (pct >= 60) msg = "Good effort! Keep practising!";
    else if (pct >= 40) msg = "Nice try! A bit more practice and you'll get there!";
    else msg = "Keep going! Practice makes progress!";
    document.getElementById("result-msg").textContent = msg;

    const list = document.getElementById("results-list");
    list.innerHTML = "<h3 style='margin-bottom:12px; color:#6d3a5a;'>Review your answers:</h3>";
    state.answers.forEach((a, i) => {
        const item = document.createElement("div");
        item.className = "result-item " + (a.correct ? "was-correct" : "was-wrong");
        item.innerHTML = `
            <div class="ri-q">${i + 1}. ${a.question.q}</div>
            ${a.correct
                ? `<div class="ri-correct">✓ ${a.selected}</div>`
                : `<div class="ri-yours">✗ Your answer: ${a.selected}</div><div class="ri-correct">✓ Correct: ${a.question.answer}</div>`
            }
        `;
        list.appendChild(item);
    });
}

function getOctoLevelForStars(stars) {
    let lvl = 0;
    for (let i = OCTO_LEVELS.length - 1; i >= 0; i--) {
        if (stars >= OCTO_LEVELS[i].starsNeeded) { lvl = i; break; }
    }
    return lvl;
}

function retryQuiz() { startQuiz(state.currentSubject, state.currentTopic); }

// ============================================================
//  INIT
// ============================================================
renderHome();
</script>
